<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 400px;
            max-height: 600px;
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .logo {
            font-size: 20px;
            margin-right: 8px;
        }
        
        .title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .status {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        
        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .status.waiting {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
        
        .status-icon {
            font-size: 16px;
            margin-right: 8px;
        }
        
        .status-text {
            font-weight: 500;
        }
        
        .errors {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 12px;
        }
        
        .error-item {
            background: #fff;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .timestamp {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
        }
        
        .actions {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }
        
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 8px;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        .btn.secondary {
            background: #6c757d;
        }
        
        .btn.secondary:hover {
            background: #545b62;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🔍</div>
        <div class="title">L1 Annotation Linter</div>
    </div>
    
    <div id="status" class="status waiting">
        <div class="status-icon">⏳</div>
        <div class="status-text">Waiting for annotation data...</div>
    </div>
    
    <div id="results" class="hidden">
        <div id="errors" class="errors"></div>
        <div id="timestamp" class="timestamp"></div>
    </div>
    
    <div class="actions">
        <button id="manualLint" class="btn">Manual Lint</button>
        <button id="exportData" class="btn secondary">Export Data</button>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
