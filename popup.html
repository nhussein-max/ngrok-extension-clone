<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 420px;
            max-height: 650px;
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.4;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo {
            font-size: 20px;
            margin-right: 8px;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            flex-grow: 1;
        }

        .server-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .server-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .server-status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .server-status.checking {
            background: #fff3cd;
            color: #856404;
        }

        /* Loaded Data Section */
        .loaded-data {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .loaded-data-header {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            display: flex;
            align-items: center;
        }

        .loaded-data-header span {
            margin-right: 6px;
        }

        .data-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #e9ecef;
            font-size: 13px;
        }

        .data-item:last-child {
            border-bottom: none;
        }

        .data-icon {
            width: 20px;
            margin-right: 8px;
            text-align: center;
        }

        .data-icon.loaded {
            color: #28a745;
        }

        .data-icon.missing {
            color: #dc3545;
        }

        .data-label {
            flex-grow: 1;
            color: #495057;
        }

        .data-status {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .data-status.loaded {
            background: #d4edda;
            color: #155724;
        }

        .data-status.missing {
            background: #f8d7da;
            color: #721c24;
        }

        /* Patches List */
        .patches-list {
            margin-top: 8px;
            padding-left: 28px;
        }

        .patch-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 6px;
            margin: 2px;
            border-radius: 3px;
            background: #e9ecef;
            color: #495057;
            font-family: monospace;
        }

        /* Run Button */
        .run-section {
            margin-bottom: 16px;
        }

        .run-button {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .run-button.ready {
            background: #007bff;
            color: white;
        }

        .run-button.ready:hover {
            background: #0056b3;
        }

        .run-button.running {
            background: #6c757d;
            color: white;
            cursor: wait;
        }

        .run-button.disabled {
            background: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }

        /* Status */
        .status {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .status.waiting {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }

        .status.warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }

        .status.neutral {
            background: #e2e3e5;
            border: 1px solid #d6d8db;
            color: #383d41;
        }

        .status-icon {
            font-size: 16px;
            margin-right: 8px;
        }

        .status-text {
            font-weight: 500;
        }

        /* Patch Results */
        .patch-results {
            margin-bottom: 16px;
        }

        .patch-results-header {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .patch-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }

        .patch-item.passed {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .patch-item.warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }

        .patch-item.failed {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .patch-item.pending {
            background: #e9ecef;
            border: 1px solid #d6d8db;
            color: #495057;
        }

        .patch-icon {
            margin-right: 8px;
            font-weight: bold;
        }

        .patch-name {
            flex-grow: 1;
        }

        .patch-status {
            font-size: 11px;
            opacity: 0.8;
        }

        .vscode-btn {
            background: #007ACC;
            border: none;
            border-radius: 3px;
            padding: 4px 8px;
            margin-left: 8px;
            cursor: pointer;
            font-size: 11px;
            color: white;
            transition: background 0.2s;
        }

        .vscode-btn:hover {
            background: #005a9e;
        }

        .vscode-btn:disabled {
            background: #ccc;
            cursor: wait;
        }

        .patch-item.clickable {
            cursor: pointer;
        }

        .patch-item.clickable:hover {
            opacity: 0.9;
        }

        .test-output {
            margin-top: 8px;
            padding: 10px;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .test-output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .test-output-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
        }

        /* Errors */
        .errors {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 12px;
        }

        .timestamp {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
        }

        .hidden {
            display: none;
        }

        /* More Info Section */
        .more-info-toggle {
            width: 100%;
            padding: 10px 12px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .more-info-toggle:hover {
            background: #e9ecef;
        }

        #more-info-arrow {
            font-size: 10px;
            transition: transform 0.2s;
        }

        #more-info-arrow.expanded {
            transform: rotate(90deg);
        }

        .more-info-content {
            margin-top: 12px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            overflow: hidden;
        }

        .info-subsection {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }

        .info-subsection:last-child {
            border-bottom: none;
        }

        .info-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-count {
            font-size: 11px;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 10px;
            color: #6c757d;
        }

        .rubrics-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .rubric-item {
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.4;
            background: #f8f9fa;
            border-left: 3px solid #dee2e6;
        }

        .rubric-item.explicit {
            border-left-color: #007bff;
        }

        .rubric-item.implicit {
            border-left-color: #6c757d;
        }

        .rubric-item.invalid {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .rubric-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 5px;
            border-radius: 3px;
            margin-right: 6px;
        }

        .rubric-tag.explicit {
            background: #cce5ff;
            color: #004085;
        }

        .rubric-tag.implicit {
            background: #e2e3e5;
            color: #383d41;
        }

        .rubric-tag.invalid {
            background: #f8d7da;
            color: #721c24;
        }

        .rubric-warning {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #dc3545;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .ranking-content {
            font-size: 12px;
            line-height: 1.5;
            color: #495057;
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .scores-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid #e9ecef;
        }

        .score-name {
            color: #495057;
            font-weight: 500;
        }

        .score-value {
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            min-width: 20px;
            text-align: center;
        }

        .score-value.score-5 {
            background: #d4edda;
            color: #155724;
        }

        .score-value.score-4 {
            background: #cce5ff;
            color: #004085;
        }

        .score-value.score-3 {
            background: #fff3cd;
            color: #856404;
        }

        .score-value.score-2 {
            background: #f8d7da;
            color: #721c24;
        }

        .score-value.score-1 {
            background: #f5c6cb;
            color: #721c24;
        }

        /* No Data Message */
        .no-data {
            text-align: center;
            padding: 30px;
            color: #6c757d;
        }

        .no-data-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🔍</div>
        <div class="title">L1 Patch Validator</div>
        <div id="server-status" class="server-status checking">Checking...</div>
    </div>

    <!-- No Data State -->
    <div id="no-data" class="no-data">
        <div class="no-data-icon">📋</div>
        <div>Waiting for annotation data...</div>
        <div style="font-size: 12px; margin-top: 8px;">Navigate to a task page to load data</div>
    </div>

    <!-- Loaded Data Section -->
    <div id="loaded-data" class="loaded-data hidden">
        <div class="loaded-data-header">
            <span>📦</span> Loaded Data
        </div>
        <div class="data-item">
            <span id="dockerfile-icon" class="data-icon missing">✗</span>
            <span class="data-label">Dockerfile</span>
            <span id="dockerfile-status" class="data-status missing">Missing</span>
        </div>
        <div class="data-item">
            <span id="testscripts-icon" class="data-icon missing">✗</span>
            <span class="data-label">Test Scripts</span>
            <span id="testscripts-status" class="data-status missing">Missing</span>
        </div>
        <div class="data-item">
            <span id="patches-icon" class="data-icon missing">✗</span>
            <span class="data-label">Patches</span>
            <span id="patches-status" class="data-status missing">0 found</span>
        </div>
        <div id="patches-list" class="patches-list hidden"></div>
    </div>

    <!-- Run Buttons -->
    <div id="run-section" class="run-section hidden">
        <button id="check-button" class="run-button disabled" style="margin-bottom: 8px; background: #17a2b8;">Check Patches Apply</button>
        <button id="run-button" class="run-button disabled">Run Full Validation</button>
    </div>

    <!-- Status -->
    <div id="status" class="status waiting hidden">
        <div class="status-icon">⏳</div>
        <div class="status-text">Ready to validate</div>
    </div>

    <!-- Patch Results -->
    <div id="patch-results" class="patch-results hidden">
        <div class="patch-results-header">Validation Results</div>
        <div id="patch-list"></div>
    </div>

    <!-- Test Output -->
    <div id="test-output-section" class="hidden">
        <div class="test-output-header">
            <span id="test-output-title">Test Output</span>
            <button id="test-output-close" class="test-output-close">×</button>
        </div>
        <div id="test-output" class="test-output"></div>
    </div>

    <!-- Errors -->
    <div id="results" class="hidden">
        <div id="errors" class="errors"></div>
        <div id="timestamp" class="timestamp"></div>
    </div>

    <!-- More Info Section -->
    <div id="more-info-section" class="hidden">
        <button id="more-info-toggle" class="more-info-toggle">
            <span id="more-info-arrow">▶</span> More Info
        </button>
        <div id="more-info-content" class="more-info-content hidden">
            <!-- Rubrics -->
            <div id="rubrics-section" class="info-subsection">
                <div class="info-header">
                    <span>📋</span> Rubrics <span id="rubrics-count" class="info-count"></span>
                </div>
                <div id="rubrics-list" class="rubrics-list"></div>
            </div>
            <!-- Ranking Scores -->
            <div id="scores-section" class="info-subsection hidden">
                <div class="info-header">
                    <span>⭐</span> Ranking Scores
                </div>
                <div id="scores-list" class="scores-list"></div>
            </div>
            <!-- Ranking Explanation -->
            <div id="ranking-section" class="info-subsection hidden">
                <div class="info-header">
                    <span>📊</span> Ranking Explanation
                </div>
                <div id="ranking-content" class="ranking-content"></div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
