<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 400px;
            max-height: 600px;
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .logo {
            font-size: 20px;
            margin-right: 8px;
        }
        
        .title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .status {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        
        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .status.waiting {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
        
        .status-icon {
            font-size: 16px;
            margin-right: 8px;
        }
        
        .status-text {
            font-weight: 500;
        }
        
        .errors {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 12px;
        }
        
        .error-item {
            background: #fff;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .timestamp {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
        }
        
        .email-section {
            margin-bottom: 16px;
            padding: 14px;
            background: #e8f4fd;
            border: 1px solid #bee5eb;
            border-radius: 6px;
            order: -1; /* Ensure it appears first */
        }
        
        .email-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .email-label {
            font-weight: 600;
            color: #0c5460;
            font-size: 14px;
        }

        .email-toggle {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #0c5460;
        }

        .email-toggle input[type="checkbox"] {
            margin-right: 4px;
        }
        
        .email-content {
            font-family: monospace;
            font-size: 13px;
            color: #0c5460;
            word-break: break-all;
            font-weight: 500;
            background: #ffffff;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #b8daff;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🔍</div>
        <div class="title">L1 Annotation Linter</div>
    </div>
    
    <div id="email-section" class="email-section hidden">
        <div class="email-header">
            <span class="email-label">📧 Email</span>
            <label class="email-toggle">
                <input type="checkbox" id="email-toggle" checked>
                Show
            </label>
        </div>
        <div id="email-content" class="email-content"></div>
    </div>
    
    <div id="status" class="status waiting">
        <div class="status-icon">⏳</div>
        <div class="status-text">Waiting for annotation data...</div>
    </div>
    
    <div id="results" class="hidden">
        <div id="errors" class="errors"></div>
        <div id="timestamp" class="timestamp"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
